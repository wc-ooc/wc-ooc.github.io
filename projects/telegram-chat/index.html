  <title>Telegram Chat UI Demo</title>
  <style>
    :root {

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); }
    body { overflow: hidden; }
    button, input, textarea { font: inherit; }
    button { border: 0; background: none; cursor: pointer; }
    .app { width: 100vw; height: 100vh; display: flex; background: var(--bg); overflow: hidden; }

    .side-head { height: 68px; display: flex; gap: 12px; align-items: center; padding: 12px 16px 12px 18px; border-bottom: 1px solid var(--rule); }
    .hamb { width: 36px; height: 36px; border-radius: 50%; display: grid; place-items: center; color: var(--muted); }
    .hamb:hover, .icon:hover { background: #f2f5f8; color: var(--primary); }
    .hamb span, .hamb span::before, .hamb span::after { display: block; width: 18px; height: 2px; border-radius: 2px; background: currentColor; content: ""; }
    .hamb span::before { transform: translateY(-6px); }
    .hamb span::after { transform: translateY(4px); }
    .search { position: relative; flex: 1; }
    .search input { width: 100%; border: 0; outline: 0; background: #f0f2f5; border-radius: 999px; padding: 10px 14px 10px 36px; color: var(--text); font-size: 14px; }
    .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }

    .conv:hover, .conv.active { background: var(--active); }
    .avatar { position: relative; width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 800; flex: 0 0 44px; font-size: 13px; }
    .avatar.sm { width: 40px; height: 40px; flex-basis: 40px; font-size: 12px; }
    .online::after { content: ""; position: absolute; right: 0; bottom: 0; width: 10px; height: 10px; border: 2px solid #fff; border-radius: 50%; background: #35d06f; }
    .conv-main { min-width: 0; flex: 1; }
    .row { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .name { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #111827; }

    .last { margin-top: 3px; display: flex; gap: 8px; align-items: center; }

    .badge { min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; display: grid; place-items: center; background: var(--primary); color: #fff; font-size: 11px; font-weight: 800; }
    .side-foot { height: 46px; display: flex; padding: 4px 16px; gap: 12px; border-top: 1px solid var(--rule); }

    .back { display: none; width: 34px; height: 34px; border-radius: 50%; }
    .title { flex: 1; min-width: 0; }
    .title strong { display: block; font-size: 14px; font-weight: 800; }
    .title span { display: block; color: #2fbf63; font-size: 12px; margin-top: 2px; }
    .actions { display: flex; gap: 8px; color: var(--muted); }
    .actions .icon { width: 28px; height: 28px; flex: 0 0 28px; border-radius: 50%; font-size: 18px; }
    .messages {
      flex: 1; overflow: auto; padding: 22px 26px 18px;
      background-color: #f3f6fa;
      background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.55) 0 14px, rgba(228,234,241,.28) 14px 28px);
    }
    .date { width: max-content; margin: 2px auto 12px; padding: 5px 12px; border-radius: 999px; background: rgba(0,0,0,.1); color: rgba(17,24,39,.55); font-size: 12px; font-weight: 800; }

    .msg-row.sent { justify-content: flex-end; }
    .mini-avatar { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 10px; font-weight: 800; flex: 0 0 28px; }
    .spacer { width: 28px; flex: 0 0 28px; }
    .bubble { max-width: min(56%, 520px); padding: 9px 12px 6px; border-radius: 12px; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-size: 14px; line-height: 1.42; word-break: break-word; color: #111827; }
    .sent .bubble { background: var(--bubble); border-bottom-right-radius: 4px; }
    .recv .bubble { border-bottom-left-radius: 4px; }
    .meta { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 2px; color: rgba(17,24,39,.36); font-size: 10px; }
    .meta svg { color: var(--primary); }
    .composer { height: 50px; display: flex; align-items: center; gap: 10px; padding: 7px 16px; background: var(--card); border-top: 1px solid var(--rule); }
    .composer .round { width: 34px; height: 34px; border-radius: 50%; color: var(--muted); display: grid; place-items: center; }
    .input-wrap { flex: 1; min-height: 36px; display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 24px; background: #f0f2f5; }
    textarea { flex: 1; resize: none; border: 0; outline: 0; background: transparent; max-height: 120px; color: var(--text); }
    .send { width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; background: #eef1f5; color: var(--muted); }
    @media (max-width: 760px) {
      .sidebar { position: absolute; inset: 0 auto 0 0; z-index: 4; transform: translateX(-100%); transition: transform .2s ease; }
      .sidebar.show { transform: translateX(0); }
      .back { display: grid; place-items: center; }
      .actions .hide-mobile { display: none; }
      .bubble { max-width: 78%; }
      .overlay { position: absolute; inset: 0; background: rgba(0,0,0,.28); z-index: 3; display: none; }
      .overlay.show { display: block; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar show">
      <div class="side-head">
        <button class="hamb" aria-label="菜单"><span></span></button>
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" placeholder="Search" />
        </div>
      </div>
      <div id="list" class="list"></div>
      <div class="side-foot">
        <button class="icon" title="Settings">⚙</button>
        <button class="icon" title="Contacts">👥</button>
        <button class="icon" title="Saved">★</button>
        <button class="icon" title="Night mode">☾</button>
        <button class="icon" title="Help">?</button>
      </div>
    </aside>
    <div id="overlay" class="overlay"></div>
    <main class="chat">
      <header class="chat-head">
        <button id="back" class="back">←</button>
        <div id="headAvatar" class="avatar sm"></div>
        <div class="title">
          <strong id="headName"></strong>
          <span id="headStatus"></span>
        </div>
        <div class="actions">
          <button class="icon">☎</button>
          <button class="icon hide-mobile">▣</button>
          <button class="icon hide-mobile">⌕</button>
          <button class="icon">⋮</button>
        </div>
      </header>
      <section id="messages" class="messages"></section>
      <footer class="composer">
        <button class="round">☺</button>
        <div class="input-wrap">
          <textarea id="input" rows="1" placeholder="Message"></textarea>
          <button class="round">📎</button>
        </div>
        <button id="send" class="send">➤</button>
      </footer>
    </main>
  </div>
  <script>
    const conversations = [
      { id: 1, name: "Elena Sorokina", initials: "ES", lastMessage: "Can you send me the updated file?", time: "11:42", unread: 2, online: true, color: "#2aabee", messages: [
        ["Hey! Are you free this afternoon?", "11:30", false], ["Yes, from 3pm. What's up?", "11:31", true], ["I need help with the design review for the new onboarding flow.", "11:33", false], ["Sure, I can take a look. Send me the Figma link.", "11:35", true], ["Here it is: figma.com/file/abc123 — the new screens start at page 4.", "11:37", false], ["Got it, reviewing now. The hero section looks great btw.", "11:39", true], ["Can you send me the updated file?", "11:42", false]
      ]},
      { id: 2, name: "Design Team", initials: "DT", lastMessage: "Marcus: Pushed the new components ✓", time: "10:58", unread: 0, online: false, color: "#9c6def", messages: [
        ["Morning everyone! Design sync in 10.", "09:50", false], ["On my way", "09:52", true], ["Reminder: sprint review is Friday at 2pm", "10:15", false], ["The new button components are ready for handoff", "10:44", false], ["Looks clean — merged!", "10:51", true], ["Marcus: Pushed the new components ✓", "10:58", false]
      ]},
      { id: 3, name: "Artem Volkov", initials: "AV", lastMessage: "See you at 6 then 👍", time: "Yesterday", unread: 0, online: false, color: "#e17055", messages: [["Are you going to the meetup tonight?", "18:10", false], ["Yes! Starts at 6 right?", "18:12", true], ["Yeah, Loft Space on Lenina St", "18:14", false], ["See you at 6 then 👍", "18:15", false]] },
      { id: 4, name: "Saved Messages", initials: "★", lastMessage: "UI references — iOS 17 blur patterns", time: "Mon", unread: 0, online: false, color: "#2aabee", messages: [["UI references — iOS 17 blur patterns", "Mon", true], ["https://developer.apple.com/design/human-interface-guidelines/", "Mon", true]] },
      { id: 5, name: "Mia Hartmann", initials: "MH", lastMessage: "The report looks good, submitting now", time: "Sun", unread: 0, online: true, color: "#00b894", messages: [["Did you finish the Q2 analysis?", "14:00", true], ["Almost done, just adding the charts", "14:05", false], ["Take your time, deadline is 5pm", "14:06", true], ["The report looks good, submitting now", "16:48", false]] },
      { id: 6, name: "Product Roadmap", initials: "PR", lastMessage: "v2.1 ships next Thursday — all green", time: "Sat", unread: 5, online: false, color: "#fdcb6e", messages: [["Feature freeze confirmed for Wednesday", "Sat", false], ["QA has signed off on all P0 issues", "Sat", false], ["v2.1 ships next Thursday — all green", "Sat", false]] }
    ];
    conversations.forEach(c => c.messages = c.messages.map((m, i) => ({ id: i + 1, text: m[0], time: m[1], sent: m[2], status: "read" })));
    let activeId = 1;
    const $ = s => document.querySelector(s);
    function conv() { return conversations.find(c => c.id === activeId); }
    function renderList() {
      const q = $("#search").value.toLowerCase();
      $("#list").innerHTML = conversations.filter(c => c.name.toLowerCase().includes(q)).map(c => `
        <button class="conv ${c.id === activeId ? "active" : ""}" data-id="${c.id}">
          <div class="avatar ${c.online ? "online" : ""}" style="background:${c.color}">${c.initials}</div>
          <div class="conv-main">
            <div class="row"><span class="name">${c.name}</span><span class="time">${c.time}</span></div>
            <div class="last"><span>${c.lastMessage}</span>${c.unread ? `<span class="badge">${c.unread}</span>` : ""}</div>
          </div>
        </button>`).join("");
      document.querySelectorAll(".conv").forEach(btn => btn.onclick = () => {
        activeId = Number(btn.dataset.id);
        conv().unread = 0;
        $("#sidebar").classList.remove("show");
        $("#overlay").classList.remove("show");
        render();
      });
    }
    function renderMessages() {
      const c = conv();
      $("#headAvatar").textContent = c.initials;
      $("#headAvatar").style.background = c.color;
      $("#headAvatar").className = `avatar sm ${c.online ? "online" : ""}`;
      $("#headName").textContent = c.name;
      $("#headStatus").textContent = c.online ? "online" : "last seen recently";
      $("#messages").innerHTML = `<div class="date">Today</div>` + c.messages.map((m, idx) => {
        const show = !m.sent;
        return `<div class="msg-row ${m.sent ? "sent" : "recv"}">
          ${m.sent ? "" : (show ? `<div class="mini-avatar" style="background:${c.color}">${c.initials}</div>` : `<div class="spacer"></div>`)}
          <div class="bubble">${m.text}<div class="meta"><span>${m.time}</span>${m.sent ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>` : ""}</div></div>
        </div>`;
      }).join("");
      $("#messages").scrollTop = $("#messages").scrollHeight;
    }
    function send() {
      const input = $("#input");
      const text = input.value.trim();
      if (!text) return;
      const d = new Date();
      const time = String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
      conv().messages.push({ id: Date.now(), text, time, sent: true, status: "sent" });
      conv().lastMessage = text;
      conv().time = time;
      input.value = "";
      render();
    }
    function render() { renderList(); renderMessages(); }
    $("#search").oninput = renderList;
    $("#send").onclick = send;
    $("#input").onkeydown = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };
    $("#back").onclick = () => { $("#sidebar").classList.add("show"); $("#overlay").classList.add("show"); };
    $("#overlay").onclick = () => { $("#sidebar").classList.remove("show"); $("#overlay").classList.remove("show"); };
    render();
  </script>
</body>
</html>
