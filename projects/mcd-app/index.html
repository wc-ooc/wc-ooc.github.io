<body>

      <main class="body">

          <div class="banner-content"><h2 id="bannerTitle">满减特惠</h2><p id="bannerSub">单品满30减8，套餐享9折</p></div>
          <div class="dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span></div>
        </section>

          <button><span class="qicon">🔥</span><span>热销</span></button>
          <button><span class="qicon">⚡</span><span>特惠</span></button>
          <button><span class="qicon">🎁</span><span>兑换</span></button>
          <button><span class="qicon">⭐</span><span>积分</span></button>
          <button><span class="qicon">⏰</span><span>预约</span></button>
        </section>
        <section class="section">
          <div class="section-head"><h3 class="section-title">🔥 闪购特惠 <small style="background:#fee2e2;color:#da291c;border-radius:999px;padding:2px 7px;font-size:10px;">今日限定</small></h3><button class="more">查看更多 ›</button></div>
          <div id="flash" class="flash"></div>
        </section>
        <section class="section" style="display:grid;gap:10px;">
          <div class="ad blue"><div><span>联名</span><b>百事×麦当劳</b><p>百事可乐联名杯 全新上市</p></div><button>立即查看</button></div>
          <div class="ad dark"><div><span>活动</span><b>OREO黑白派对</b><p>奥利奥麦旋风升杯免费</p></div><button>立即查看</button></div>
        </section>
        <section class="section">
          <div class="section-head"><h3 class="section-title">联名专区</h3><button class="more">更多 ›</button></div>
          <div class="flash">
            <div class="flash-card"><div class="food-img"></div><div class="flash-body"><p class="food-name">百事联名巨无霸套</p><div class="price-row"><span class="price">¥42</span><button class="plus">+</button></div></div></div>
            <div class="flash-card"><div class="food-img"></div><div class="flash-body"><p class="food-name">OREO黑白套餐</p><div class="price-row"><span class="price">¥36</span><button class="plus">+</button></div></div></div>
            <div class="flash-card"><div class="food-img"></div><div class="flash-body"><p class="food-name">联名甜筒</p><div class="price-row"><span class="price">¥10</span><button class="plus">+</button></div></div></div>
          </div>
        </section>
        <section class="section">
          <div class="section-head"><h3 class="section-title">推荐菜品</h3></div>
          <div id="cats" class="cats"></div>
          <div id="items" class="grid"></div>
        </section>
      </main>
      <footer id="cartbar" class="cartbar">
        <button id="openCart" class="cartbtn"><span class="cart-left"><span class="cart-icon">🛒<span id="cartCount" class="count">0</span></span><span id="cartLabel">0 件商品</span></span><span><b id="cartTotal">¥0</b> <span class="settle">去结算</span></span></button>
      </footer>
    </div>
    <div id="mask" class="drawer-mask"></div>
    <aside id="drawer" class="drawer">
      <div class="handle"></div>
      <div class="drawer-head"><strong>购物车</strong><button id="closeCart">✕</button></div>
      <div id="drawerList" class="drawer-list"></div>
      <div id="drawerFoot" class="drawer-foot"></div>
    </aside>
  </div>
  <script>
    const categories = ["全部", "汉堡", "小食", "鸡肉", "薯条", "饮料", "甜点", "早餐", "健康轻食"];
    const items = [
      { id:1,name:"巨无霸",desc:"双层牛肉饼+生菜+芝士+特制酱",price:28,tag:"热销",cat:"汉堡" },
      { id:2,name:"麦辣鸡腿堡",desc:"香辣鸡腿肉+爽脆生菜+特调沙司",price:24,tag:"爆款",cat:"汉堡" },
      { id:9,name:"双层鱼堡",desc:"香脆鱼柳+新鲜生菜+塔塔酱",price:22,tag:"鲜嫩",cat:"汉堡" },
      { id:14,name:"麦辣鸡翅（4块）",desc:"外酥里嫩，香辣入骨，一口沦陷",price:24,tag:"必点",cat:"小食" },
      { id:15,name:"麦乐鸡（6块）",desc:"金黄鸡块，脆皮多汁，四种蘸酱",price:18,tag:"热销",cat:"小食" },
      { id:16,name:"薯条（大）",desc:"黄金薯条现炸出锅，酥脆可口",price:15,tag:"经典",cat:"薯条" },
      { id:6,name:"嫩烤鸡腿排",desc:"低温慢烤鸡腿，Q弹多汁无柴感",price:22,tag:"嫩烤",cat:"鸡肉" },
      { id:5,name:"麦卡费拿铁",desc:"现磨阿拉比卡咖啡豆+新鲜牛奶",price:22,tag:"新品",cat:"饮料" },
      { id:4,name:"麦旋风奥利奥",desc:"香浓冰淇淋+奥利奥碎粒搅拌",price:16,tag:"甜蜜",cat:"甜点" },
      { id:7,name:"麦满分早餐堡",desc:"鸡蛋+培根+芝士，元气满满一整天",price:18,tag:"早餐",cat:"早餐" },
      { id:8,name:"嫩烤鸡腿沙拉",desc:"新鲜时蔬+嫩烤鸡腿+低卡酱汁",price:28,tag:"轻食",cat:"健康轻食" }
    ];
    let active = "全部", cart = {};
    const $ = s => document.querySelector(s);
    function add(id) { cart[id] = (cart[id] || 0) + 1; renderCart(); }
    function remove(id) { if (cart[id] > 1) cart[id]--; else delete cart[id]; renderAll(); }
    function total() { return Object.entries(cart).reduce((s, [id, q]) => s + (items.find(i => i.id == id)?.price || 0) * q, 0); }
    function count() { return Object.values(cart).reduce((a,b)=>a+b,0); }
    function emoji(item) { if (item.cat === "饮料") return "☕"; if (item.cat === "薯条") return "🍟"; if (item.cat === "甜点") return "🍦"; if (item.cat === "健康轻食") return "🥗"; return "🍔"; }
    function renderCats() {
      $("#cats").innerHTML = categories.map(c => `<button class="cat ${c===active?"active":""}" data-cat="${c}">${c}</button>`).join("");
      document.querySelectorAll(".cat").forEach(b => b.onclick = () => { active = b.dataset.cat; renderAll(); });
    }
    function renderItems() {
      const list = active === "全部" ? items : items.filter(i => i.cat === active);
      $("#items").innerHTML = list.map(i => `<article class="item"><div class="food-img" style="--emoji:'${emoji(i)}'"></div><div class="item-body"><span class="badge">${i.tag}</span><p class="food-name">${i.name}</p><p class="desc">${i.desc}</p><div class="price-row"><span class="price">¥${i.price}</span><button class="plus" data-id="${i.id}">+</button></div></div></article>`).join("");
      document.querySelectorAll("#items .plus").forEach(b => b.onclick = () => add(Number(b.dataset.id)));
      document.querySelectorAll(".item .food-img").forEach((el, idx) => el.style.setProperty("--emoji", `"${emoji(list[idx])}"`));
    }
    function renderFlash() {
      $("#flash").innerHTML = items.slice(0,5).map(i => `<div class="flash-card"><div class="food-img"></div><div class="flash-body"><p class="food-name">${i.name}</p><div class="price-row"><span class="price">¥${i.price}</span><button class="plus" data-id="${i.id}">+</button></div></div></div>`).join("");
      document.querySelectorAll("#flash .plus").forEach(b => b.onclick = () => add(Number(b.dataset.id)));
    }
    function renderCart() {
      const c = count(), t = total();
      $("#cartbar").classList.toggle("show", c > 0);
      $("#cartCount").textContent = c;
      $("#cartLabel").textContent = `${c} 件商品`;
      $("#cartTotal").textContent = `¥${t}`;
      const entries = Object.entries(cart).map(([id, qty]) => ({ item: items.find(i => i.id == id), qty })).filter(e => e.item);
      $("#drawerList").innerHTML = entries.length ? entries.map(({item, qty}) => `<div class="cart-item"><div class="thumb">${emoji(item)}</div><div class="cart-item-main"><b>${item.name}</b><span class="price">¥${item.price}</span></div><div class="qty"><button class="minus" data-id="${item.id}">−</button><b>${qty}</b><button class="plus" data-id="${item.id}">+</button></div></div>`).join("") : `<div class="empty">🛒<br>购物车是空的</div>`;
      $("#drawerFoot").innerHTML = entries.length ? `<div><small style="color:#999">合计</small><div class="price" style="font-size:22px">¥${t}</div></div><button class="checkout">去结算</button>` : "";
      document.querySelectorAll(".drawer .plus").forEach(b => b.onclick = () => add(Number(b.dataset.id)));
      document.querySelectorAll(".drawer .minus").forEach(b => b.onclick = () => remove(Number(b.dataset.id)));
    }
    function renderAll() { renderCats(); renderFlash(); renderItems(); renderCart(); }
    $("#openCart").onclick = () => { $("#mask").classList.add("show"); $("#drawer").classList.add("show"); };
    $("#closeCart").onclick = $("#mask").onclick = () => { $("#mask").classList.remove("show"); $("#drawer").classList.remove("show"); };
    renderAll();
  </script>
</body>
