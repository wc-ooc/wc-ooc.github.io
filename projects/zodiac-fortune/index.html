<!-- Generated by Trae Work -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日运势</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #050510; font-family: Raleway, ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
    body { display: grid; place-items: center; }
    .wrap { width: 100vw; min-height: 100vh; display: grid; place-items: center; background: #050510; }
    .card {
      position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;
      width: min(420px, 100vw); aspect-ratio: 9 / 16;
      background: linear-gradient(160deg, #0b0822 0%, #060415 50%, #0a0720 100%);
      box-shadow: 0 0 80px rgba(139,92,246,.15), 0 0 160px rgba(59,130,246,.08);
    }
    .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s ease-in-out infinite alternate; }
    .top { position: relative; z-index: 2; margin-top: 40px; text-align: center; }
    .top .title { margin: 0; color: rgba(196,181,253,.7); font-weight: 400; font-size: clamp(.95rem,4vw,1.1rem); letter-spacing: .3em; }
    .top .date { margin: 4px 0 0; color: rgba(148,163,184,.5); font-weight: 300; font-size: clamp(.75rem,3.2vw,.9rem); letter-spacing: .25em; }
    .center { position: relative; z-index: 2; flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .circle {
      position: relative; width: 82%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden;
      border-radius: 50%; cursor: pointer; user-select: none;
      background: radial-gradient(ellipse at 35% 30%, rgba(139,92,246,.55) 0%, rgba(59,130,246,.35) 30%, rgba(20,184,166,.2) 55%, rgba(236,72,153,.15) 75%, rgba(5,5,16,.6) 100%);
      box-shadow: 0 0 60px rgba(139,92,246,.4), 0 0 120px rgba(59,130,246,.2), inset 0 0 60px rgba(0,0,0,.4);
      transition: box-shadow .6s ease;
    }
    .circle::after { content: ""; position: absolute; inset: 0; border-radius: 50%; border: 1px solid rgba(196,181,253,.25); box-shadow: inset 0 0 30px rgba(139,92,246,.1); pointer-events: none; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; mix-blend-mode: screen; opacity: .7; pointer-events: none; }
    .state { position: relative; z-index: 3; text-align: center; padding: 0 32px; animation: fadeIn .4s ease forwards; }
    .idle-main { margin: 0; font-family: "Playfair Display", Georgia, serif; font-size: clamp(1.4rem,6vw,2rem); font-weight: 500; color: rgba(255,255,255,.9); letter-spacing: .2em; line-height: 1.2; }
    .line { width: 40%; height: 1px; margin: 16px auto; background: linear-gradient(90deg, transparent, rgba(196,181,253,.4), transparent); }
    .hint { margin: 0; font-size: clamp(.62rem,2.5vw,.72rem); color: rgba(226,232,240,.45); letter-spacing: .15em; font-weight: 300; }
    .track { position: relative; z-index: 3; width: 100%; overflow: hidden; }
    .strip { display: flex; will-change: transform; }
    .item { width: 96px; flex: 0 0 96px; text-align: center; padding: 10px 0; font-family: "Playfair Display", Georgia, serif; font-size: clamp(1.2rem,5vw,1.6rem); font-weight: 700; letter-spacing: .05em; }
    .result-text { margin: 0; font-family: "Playfair Display", Georgia, serif; font-size: clamp(3rem,14vw,5rem); font-weight: 700; line-height: 1; letter-spacing: .05em; }
    .sub { margin: 0; font-size: clamp(.65rem,2.8vw,.8rem); letter-spacing: .15em; font-weight: 300; }
    .again { margin-top: 20px; font-size: .55rem; letter-spacing: .25em; color: rgba(148,163,184,.35); font-weight: 300; }
    .footer-space { padding-bottom: 40px; }
    @keyframes twinkle { from { opacity: var(--o); transform: scale(1); } to { opacity: calc(var(--o) + .4); transform: scale(1.4); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(.88); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="card">
      <div class="top">
        <p class="title">今日运势</p>
        <p class="date" id="date"></p>
      </div>
      <div class="center">
        <div class="circle" id="circle">
          <canvas id="aurora" width="360" height="360"></canvas>
          <div id="content"></div>
        </div>
      </div>
      <div class="footer-space"></div>
    </div>
  </div>
  <script>
    const fortunes = [
      { text: "大吉", color: "rgba(253,224,71,.95)", glow: "rgba(253,224,71,.7)", sub: "万事如意，福星高照" },
      { text: "吉", color: "rgba(134,239,172,.95)", glow: "rgba(134,239,172,.6)", sub: "顺遂平稳，好运相随" },
      { text: "平", color: "rgba(196,181,253,.9)", glow: "rgba(139,92,246,.5)", sub: "不偏不倚，静待时机" },
      { text: "凶", color: "rgba(251,146,60,.95)", glow: "rgba(251,146,60,.55)", sub: "谨慎行事，化险为夷" },
      { text: "大凶", color: "rgba(248,113,113,.95)", glow: "rgba(239,68,68,.6)", sub: "诸事不宜，静守为上" }
    ];
    const itemW = 96, reps = 12;
    let phase = "idle", picked = null;
    const card = document.getElementById("card");
    const circle = document.getElementById("circle");
    const content = document.getElementById("content");
    const date = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Shanghai" }));
    document.getElementById("date").textContent = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
    for (let i = 0; i < 80; i++) {
      const s = document.createElement("span");
      const o = Math.random() * .6 + .15;
      s.className = "star";
      s.style.left = Math.random() * 100 + "%";
      s.style.top = Math.random() * 100 + "%";
      const size = Math.random() * 1.8 + .4;
      s.style.width = size + "px";
      s.style.height = size + "px";
      s.style.setProperty("--o", o);
      s.style.opacity = o;
      s.style.animationDelay = Math.random() * 4 + "s";
      s.style.animationDuration = 2 + Math.random() * 4 + "s";
      card.appendChild(s);
    }
    const canvas = document.getElementById("aurora"), ctx = canvas.getContext("2d");
    let t = 0;
    function draw() {
      t += .003;
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      const palettes = [
        ["rgba(139,92,246,.25)", "rgba(59,130,246,.12)", "rgba(0,0,0,0)"],
        ["rgba(236,72,153,.2)", "rgba(139,92,246,.1)", "rgba(0,0,0,0)"],
        ["rgba(20,184,166,.18)", "rgba(99,102,241,.09)", "rgba(0,0,0,0)"]
      ];
      for (let layer = 0; layer < 3; layer++) {
        const offset = layer * Math.PI * 2 / 3 + t;
        const grad = ctx.createRadialGradient(w / 2 + Math.cos(offset) * 8, h / 2 + Math.sin(offset) * 8, w * .28, w / 2, h / 2, w * .48);
        grad.addColorStop(0, palettes[layer][0]);
        grad.addColorStop(.5, palettes[layer][1]);
        grad.addColorStop(1, palettes[layer][2]);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
      }
      requestAnimationFrame(draw);
    }
    draw();
    function rgbaAlpha(c, a) { return c.replace(/[\d.]+\)$/, a + ")"); }
    function renderIdle() {
      circle.style.boxShadow = "0 0 60px rgba(139,92,246,.4), 0 0 120px rgba(59,130,246,.2), inset 0 0 60px rgba(0,0,0,.4)";
      content.innerHTML = `<div class="state"><p class="idle-main">今日预测</p><div class="line"></div><p class="hint">点击占卜</p></div>`;
    }
    function renderResult() {
      circle.style.boxShadow = `0 0 70px ${picked.glow}, 0 0 140px ${rgbaAlpha(picked.glow, ".25")}, inset 0 0 60px rgba(0,0,0,.35)`;
      content.innerHTML = `<div class="state"><p class="result-text" style="color:${picked.color};text-shadow:0 0 30px ${picked.glow},0 0 60px ${picked.glow}">${picked.text}</p><div class="line" style="width:50%;background:linear-gradient(90deg,transparent,${rgbaAlpha(picked.color, ".4")},transparent)"></div><p class="sub" style="color:${rgbaAlpha(picked.color, ".7")}">${picked.sub}</p><div class="again">点击再求一签</div></div>`;
    }
    function spin() {
      const idx = Math.floor(Math.random() * fortunes.length);
      picked = fortunes[idx];
      phase = "spinning";
      content.innerHTML = `<div class="track"><div class="strip" id="strip">${Array.from({ length: reps }, (_, r) => fortunes.map((f, i) => `<div class="item" style="color:${f.color};text-shadow:0 0 14px ${f.glow}">${f.text}</div>`).join("")).join("")}</div></div>`;
      const strip = document.getElementById("strip");
      const circleW = circle.offsetWidth;
      const chosen = 6 * fortunes.length + idx;
      const xEnd = circleW / 2 - itemW / 2 - chosen * itemW;
      const xStart = -(reps * fortunes.length * itemW);
      const xMid = xEnd - Math.round(circleW * 2);
      requestAnimationFrame(() => {
        strip.style.transition = "none";
        strip.style.transform = `translateX(${xStart}px)`;
        requestAnimationFrame(() => {
          strip.style.transition = "transform 3s cubic-bezier(.4,0,1,.8)";
          strip.style.transform = `translateX(${xMid}px)`;
        });
      });
      setTimeout(() => {
        strip.style.transition = "transform 2s cubic-bezier(0,.3,.15,1)";
        strip.style.transform = `translateX(${xEnd}px)`;
      }, 3000);
      setTimeout(() => { phase = "result"; renderResult(); }, 5200);
    }
    circle.onclick = () => {
      if (phase === "spinning") return;
      if (phase === "result") { phase = "idle"; picked = null; renderIdle(); return; }
      spin();
    };
    renderIdle();
  </script>
</body>
</html>
